# task.yaml — task-cli's own ticket config (committed; the per-repo source of truth).
# This repo files its tickets as GitHub Issues against alex-mextner/task-cli.
version: 1
backend: github-issues
github:
  repo: auto                 # auto = resolve owner/name from the `origin` remote
  default_labels: [agent]
enforce:
  acceptance_criteria: required
  motivation: required
  user_impact: required
  cost_of_inaction: required
  formatting: strict
  screenshots:
    on_create: { required_if_label: [ui, visual] }
    on_done:   { required_if_label: [ui, visual] }
  escape_hatch: explain
classify:
  # Prioritized fallback chain — one cheap/fast model per provider; the runner uses the
  # first AVAILABLE one (key present / daemon reachable). Default head is haiku.
  fallbacks:
    - { anthropic:   claude-haiku-4-5 }
    - { openai:      gpt-5-mini }
    - { commandcode: deepseek/deepseek-v4-flash }
    - { zai:         glm-4.6-flash }
    - { google:      gemini-2.5-flash }
    - { ollama:      qwen2.5:3b }
  bias: change                 # ambiguous → change
session:
  detect: [env:TASK_SESSION, tmux-pane, git-branch]
  label_prefix: "session:"
